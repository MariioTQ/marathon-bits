<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Maratón Bits</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: transparent;
      overflow: hidden;
      width: 920px;
      height: 280px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }
    #widget {
      width: 920px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(180,0,0,0.5);
      border-top: 2px solid #c00;
      padding: 8px 12px 10px;
      position: relative;
    }
    #widget::before {
      content:''; position:absolute; inset:0;
      background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px);
      pointer-events:none; z-index:10;
    }
    .top-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
    .channels { display:flex; gap:16px; align-items:center; }
    .ch { display:flex; align-items:center; gap:5px; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; color:#bbb; letter-spacing:0.5px; }
    .ch-dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
    .ch-dot.c1 { background:#cc0000; box-shadow:0 0 6px #cc0000; }
    .ch-dot.c2 { background:#ff8c00; box-shadow:0 0 6px #ff8c00; }
    .ch-val { font-family:'Bebas Neue',sans-serif; font-size:16px; color:#fff; letter-spacing:1px; }
    .sep { color:#333; }
    .total-area { text-align:right; }
    .total-num { font-family:'Bebas Neue',sans-serif; font-size:22px; color:#fff; letter-spacing:2px; line-height:1; }
    .total-goal { font-size:11px; color:#555; font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:1px; }
    .bar-outer { position:relative; height:24px; background:#111; border:1px solid #1e1e1e; overflow:hidden; margin-bottom:5px; }
    #bar2 { position:absolute; inset:0; width:0%; background:linear-gradient(90deg,#7a3d00,#cc6600,#ff8c00); transition:width 1s cubic-bezier(.23,1,.32,1); }
    #bar1 { position:absolute; inset:0; width:0%; background:linear-gradient(90deg,#6b0000,#bb0000,#ee2222); transition:width 1s cubic-bezier(.23,1,.32,1) 0.05s; }
    .bar-outer::after { content:''; position:absolute; top:0;left:0;right:0; height:40%; background:linear-gradient(180deg,rgba(255,255,255,0.07),transparent); pointer-events:none; z-index:3; }
    .bar-pct { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:2px; color:#fff; text-shadow:0 1px 4px #000; z-index:4; }
    .bar-legend { display:flex; gap:14px; margin-bottom:7px; align-items:center; }
    .legend-item { display:flex; align-items:center; gap:4px; font-family:'Rajdhani',sans-serif; font-size:11px; color:#666; font-weight:600; letter-spacing:0.3px; }
    .legend-dot { width:10px; height:6px; border-radius:1px; }
    .legend-dot.l1 { background:#cc0000; }
    .legend-dot.l2 { background:#ff8c00; }
    .sec-title { font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:3px; color:#c00; margin-bottom:5px; }
    .milestones { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
    .ms { display:flex; flex-direction:column; background:#0c0c0c; border:1px solid #1c1c1c; border-top:2px solid #1c1c1c; padding:5px 7px; transition:border-color 0.4s,background 0.4s; position:relative; overflow:hidden; }
    .ms.reached { border-top-color:#c00; background:rgba(180,0,0,0.07); }
    .ms.reached::after { content:'✓'; position:absolute; top:3px; right:5px; font-size:10px; color:#c00; font-weight:700; }
    .ms.next { border-top-color:#ff6600; background:rgba(255,100,0,0.06); animation:pulse-next 2s ease-in-out infinite; }
    @keyframes pulse-next { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 10px rgba(255,100,0,0.25)} }
    .ms-head { display:flex; align-items:center; gap:4px; margin-bottom:2px; }
    .ms-num { font-family:'Bebas Neue',sans-serif; font-size:11px; color:#333; letter-spacing:1px; line-height:1; }
    .ms.reached .ms-num { color:#771111; }
    .ms.next    .ms-num { color:#883300; }
    .ms-bits { font-family:'Bebas Neue',sans-serif; font-size:13px; color:#2a2a2a; letter-spacing:1px; line-height:1; margin-bottom:2px; }
    .ms.reached .ms-bits { color:#882222; }
    .ms.next    .ms-bits { color:#cc5500; }
    .ms-emoji { font-size:15px; line-height:1; }
    .ms-text { font-family:'Rajdhani',sans-serif; font-size:11px; font-weight:700; color:#444; letter-spacing:0.2px; line-height:1.25; text-transform:uppercase; white-space:normal; word-break:break-word; }
    .ms.reached .ms-text { color:#bb3333; }
    .ms.next    .ms-text { color:#ff7733; }
    #notif { position:fixed; top:10px; right:-500px; background:rgba(0,0,0,0.92); border:1px solid #2a0000; border-left:3px solid #c00; padding:8px 16px; font-family:'Rajdhani',sans-serif; transition:right 0.4s cubic-bezier(.23,1,.32,1); z-index:90; }
    #notif.show { right:10px; }
    .notif-top { font-size:15px; font-weight:700; color:#fff; }
    .notif-top b { color:#ff4444; }
    .notif-bot { font-size:11px; color:#666; font-weight:600; }
    #cel { position:fixed; inset:0; pointer-events:none; z-index:100; opacity:0; transition:opacity 0.3s; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    #cel.show { opacity:1; }
    .cel-glow { position:absolute; inset:0; background:radial-gradient(ellipse at center,rgba(200,0,0,0.3) 0%,transparent 65%); }
    .cel-main { font-family:'Bebas Neue',sans-serif; font-size:60px; color:#fff; letter-spacing:5px; text-shadow:0 0 30px #c00,0 0 60px #c00; position:relative; z-index:1; text-align:center; line-height:1; }
    .cel-desc { font-family:'Bebas Neue',sans-serif; font-size:24px; color:#ff6600; letter-spacing:3px; position:relative; z-index:1; text-align:center; margin-top:6px; }
    .particle { position:fixed; animation:fall 1.6s ease-in forwards; pointer-events:none; z-index:99; }
    @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(115vh) rotate(540deg);opacity:0} }
    .cdot { display:inline-block; width:6px; height:6px; border-radius:50%; background:#333; margin-left:3px; vertical-align:middle; transition:background 0.4s; }
    .cdot.ok   { background:#4caf50; box-shadow:0 0 4px #4caf50; }
    .cdot.err  { background:#e83333; }
    .cdot.wait { background:#ff9800; animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
<div id="widget">
  <div class="top-row">
    <div class="channels">
      <div class="ch"><div class="ch-dot c1"></div>MarioTQ<span class="ch-val" id="v1">0</span><span class="cdot" id="d1"></span></div>
      <div class="sep">|</div>
      <div class="ch"><div class="ch-dot c2"></div>Akim<span class="ch-val" id="v2">0</span><span class="cdot" id="d2"></span></div>
    </div>
    <div class="total-area">
      <div class="total-num" id="tot">0 <span style="font-size:13px;color:#555;letter-spacing:1px">BITS</span></div>
      <div class="total-goal">META FINAL: 100,000 BITS</div>
    </div>
  </div>
  <div class="bar-outer">
    <div id="bar2"></div>
    <div id="bar1"></div>
    <div class="bar-pct" id="bpct">0%</div>
  </div>
  <div class="bar-legend">
    <div class="legend-item"><div class="legend-dot l1"></div>MarioTQ (rojo)</div>
    <div class="legend-item"><div class="legend-dot l2"></div>Akim (naranja)</div>
  </div>
  <div class="sec-title">RETOS DEL MARATÓN — ¡AYÚDANOS A DESBLOQUEARLOS!</div>
  <div class="milestones" id="milestones"></div>
</div>
<div id="notif">
  <div class="notif-top" id="ntop">usuario donó <b>0</b> bits</div>
  <div class="notif-bot" id="nbot">en el canal de MarioTQ</div>
</div>
<div id="cel">
  <div class="cel-glow"></div>
  <div class="cel-main" id="cmain">¡RETO DESBLOQUEADO!</div>
  <div class="cel-desc" id="cdesc"></div>
</div>
<script>
const MILESTONES = [
  { bits:10000,  emoji:'🎣', label:'Ir a pescar' },
  { bits:30000,  emoji:'💦', label:'Globazos de agua con harina' },
  { bits:40000,  emoji:'🏊', label:'Ir a balneario' },
  { bits:50000,  emoji:'😱', label:'Depilada con cera' },
  { bits:60000,  emoji:'🧪', label:'Experimento casero' },
  { bits:70000,  emoji:'🐕🐈', label:'Acampar con Chopo y Genji' },
  { bits:80000,  emoji:'🎯', label:'Reto a elegir con la banda' },
  { bits:90000,  emoji:'🩲', label:'Balneario en tanga' },
  { bits:100000, emoji:'🛵', label:'Rapizza juntos en vivo' },
];
const MAX_GOAL=100000, ID1='135201683', ID2='75262446';
const TOKEN1='5gxdemktqjg5bkj13lhqsl3gytxy3t', TOKEN2='b9pffqqf2ko27k3lkbabpqw70fwexv';
const INIT_B1=11200, INIT_B2=15270;
const S={b1:INIT_B1,b2:INIT_B2};
const triggered=new Set();
triggered.add(10000);

function save(){localStorage.setItem('mbits3',JSON.stringify({b1:S.b1,b2:S.b2}));}
function load(){try{const d=JSON.parse(localStorage.getItem('mbits3')||'{}');if(d.b1)S.b1=Math.max(INIT_B1,d.b1);if(d.b2)S.b2=Math.max(INIT_B2,d.b2);}catch(e){}}

function buildMilestones(){
  const c=document.getElementById('milestones');c.innerHTML='';
  MILESTONES.forEach((m,i)=>{
    const el=document.createElement('div');
    el.className='ms';el.id='ms_'+m.bits;
    el.innerHTML=`<div class="ms-head"><span class="ms-num">RETO ${i+1}</span><span class="ms-emoji">${m.emoji}</span></div><div class="ms-bits">${(m.bits/1000).toFixed(0)}K BITS</div><div class="ms-text">${m.label}</div>`;
    c.appendChild(el);
  });
}

function updateUI(){
  const total=S.b1+S.b2;
  const pct=Math.min(100,(total/MAX_GOAL)*100);
  const pct1=Math.min(100,(S.b1/MAX_GOAL)*100);
  document.getElementById('tot').innerHTML=`${total.toLocaleString('es-MX')} <span style="font-size:13px;color:#555;letter-spacing:1px">BITS</span>`;
  document.getElementById('v1').textContent=S.b1.toLocaleString('es-MX');
  document.getElementById('v2').textContent=S.b2.toLocaleString('es-MX');
  document.getElementById('bpct').textContent=pct.toFixed(1)+'%';
  document.getElementById('bar1').style.width=pct1+'%';
  document.getElementById('bar2').style.width=pct+'%';
  let nextSet=false;
  MILESTONES.forEach(m=>{
    const el=document.getElementById('ms_'+m.bits);if(!el)return;
    if(total>=m.bits){el.className='ms reached';}
    else if(!nextSet){el.className='ms next';nextSet=true;}
    else{el.className='ms';}
  });
  MILESTONES.forEach(m=>{if(total>=m.bits&&!triggered.has(m.bits)){triggered.add(m.bits);celebrate(m);}});
  save();
}

function celebrate(m){
  document.getElementById('cmain').textContent=m.bits===MAX_GOAL?'¡META FINAL!':'¡RETO DESBLOQUEADO!';
  document.getElementById('cdesc').textContent=m.emoji+' '+m.label;
  const el=document.getElementById('cel');el.classList.add('show');
  spawnParticles();
  setTimeout(()=>el.classList.remove('show'),m.bits===MAX_GOAL?8000:4500);
}

function spawnParticles(){
  const e=['🔥','⚡','💎','⭐','🎉','🏆'];
  for(let i=0;i<30;i++)setTimeout(()=>{const p=document.createElement('div');p.className='particle';p.textContent=e[Math.floor(Math.random()*e.length)];p.style.left=Math.random()*100+'vw';p.style.fontSize=(12+Math.random()*14)+'px';p.style.animationDelay=Math.random()*0.5+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),2200);},i*35);
}

let notifQ=[],notifShowing=false;
function queueNotif(u,a,c){notifQ.push({u,a,c});if(!notifShowing)showNextNotif();}
function showNextNotif(){
  if(!notifQ.length){notifShowing=false;return;}notifShowing=true;
  const{u,a,c}=notifQ.shift();
  document.getElementById('ntop').innerHTML=`${u} donó <b>${a.toLocaleString('es-MX')}</b> bits`;
  document.getElementById('nbot').textContent='en el canal de '+c;
  const el=document.getElementById('notif');el.classList.add('show');
  setTimeout(()=>{el.classList.remove('show');setTimeout(showNextNotif,500);},3500);
}

function dot(n,st){document.getElementById('d'+n).className='cdot '+st;}

async function subscribeCheer(sessionId,broadcasterId,token){
  const t=token.startsWith('oauth:')?token.slice(6):token;
  const v=await fetch('https://id.twitch.tv/oauth2/validate',{headers:{'Authorization':'OAuth '+t}});
  if(!v.ok)throw new Error('Token inválido');
  const{client_id}=await v.json();
  await fetch('https://api.twitch.tv/helix/eventsub/subscriptions',{
    method:'POST',
    headers:{'Authorization':'Bearer '+t,'Client-Id':client_id,'Content-Type':'application/json'},
    body:JSON.stringify({type:'channel.cheer',version:'1',condition:{broadcaster_user_id:broadcasterId},transport:{method:'websocket',session_id:sessionId}})
  });
}

function connectPS(id,token,ch){
  dot(ch,'wait');
  const ws=new WebSocket('wss://eventsub.wss.twitch.tv/ws');
  ws.onmessage=async(ev)=>{
    const msg=JSON.parse(ev.data);
    const type=msg.metadata?.message_type;
    if(type==='session_welcome'){try{await subscribeCheer(msg.payload.session.id,id,token);dot(ch,'ok');}catch(e){console.error('ch'+ch,e);dot(ch,'err');}}
    if(type==='notification'){try{const ev2=msg.payload.event;const amount=ev2.bits;const user=ev2.user_name||'Anónimo';const name=ch===1?'MarioTQ':'Akim';if(ch===1)S.b1+=amount;else S.b2+=amount;updateUI();queueNotif(user,amount,name);}catch(e){}}
    if(type==='session_reconnect'){ws.close();setTimeout(()=>connectPS(id,token,ch),500);}
  };
  ws.onerror=()=>dot(ch,'err');
  ws.onclose=()=>{dot(ch,'err');setTimeout(()=>connectPS(id,token,ch),5000);};
}

load();buildMilestones();updateUI();
connectPS(ID1,TOKEN1,1);connectPS(ID2,TOKEN2,2);
</script>
</body>
</html>
