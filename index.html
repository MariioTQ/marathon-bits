<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Maratón Bits</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      overflow: hidden;
      width: 960px;
      height: 210px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    #widget {
      width: 960px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── BARRA SUPERIOR ── */
    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.62);
      padding: 6px 10px;
    }

    .ch {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      color: #fff;
      letter-spacing: 1px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ch-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .ch-dot.c1 { background: #ee2222; }
    .ch-dot.c2 { background: #ff8c00; }
    .ch-val { font-size: 13px; color: #ddd; }

    .bar-wrap { flex: 1; position: relative; height: 16px; }
    .bar-bg   { position: absolute; inset: 0; background: rgba(255,255,255,0.08); }
    #bar2 { position: absolute; inset: 0; width: 0%; background: linear-gradient(90deg, #7a3d00, #ff8c00); transition: width 1s cubic-bezier(.23,1,.32,1); }
    #bar1 { position: absolute; inset: 0; width: 0%; background: linear-gradient(90deg, #6b0000, #ee2222); transition: width 1s cubic-bezier(.23,1,.32,1) 0.05s; }
    .bar-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 2px; color: #fff; z-index: 4; }

    .total { font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: #fff; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }
    .total small { font-size: 10px; color: #888; letter-spacing: 1px; }

    .cdot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #333; margin-left: 2px; vertical-align: middle; transition: background 0.4s; }
    .cdot.ok   { background: #4caf50; }
    .cdot.err  { background: #e83333; }
    .cdot.wait { background: #ff9800; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── GRID DE RETOS ── */
    .retos-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
    }

    .reto {
      background: rgba(0,0,0,0.62);
      border-top: 2px solid rgba(255,255,255,0.07);
      padding: 6px 7px 5px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      transition: background 0.4s, border-color 0.4s;
      position: relative;
    }

    /* ALCANZADO */
    .reto.reached {
      background: rgba(20,0,0,0.6);
      border-top-color: #c00;
    }
    .reto.reached::after {
      content: '✓ DESBLOQUEADO';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(200, 60, 60, 0.7);
      background: rgba(0,0,0,0.45);
    }

    /* SIGUIENTE */
    .reto.next {
      background: rgba(30,15,0,0.7);
      border-top-color: #ff8c00;
      animation: pulse-next 2s ease-in-out infinite;
    }
    @keyframes pulse-next {
      0%,100% { box-shadow: none; }
      50% { box-shadow: 0 0 8px rgba(255,140,0,0.2); }
    }

    /* número del reto */
    .reto-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.2);
      line-height: 1;
    }
    .reto.reached .reto-num { color: rgba(200,60,60,0.4); }
    .reto.next    .reto-num { color: rgba(255,140,0,0.7); }

    /* bits */
    .reto-bits {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      line-height: 1;
    }
    .reto.reached .reto-bits { color: rgba(200,60,60,0.5); text-decoration: line-through; }
    .reto.next    .reto-bits { color: #ff8c00; }

    /* emoji + texto */
    .reto-desc {
      display: flex;
      align-items: flex-start;
      gap: 4px;
      margin-top: 2px;
    }
    .reto-emoji { font-size: 13px; flex-shrink: 0; line-height: 1.2; }
    .reto-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      line-height: 1.2;
      word-break: break-word;
    }
    .reto.reached .reto-label { color: rgba(180,60,60,0.55); }
    .reto.next    .reto-label { color: #ffcc88; }

    /* ── NOTIFICACIÓN ── */
    #notif { position: fixed; top: 10px; right: -500px; background: rgba(0,0,0,0.88); border-left: 3px solid #c00; padding: 7px 14px; font-family: 'Rajdhani', sans-serif; transition: right 0.4s cubic-bezier(.23,1,.32,1); z-index: 90; }
    #notif.show { right: 10px; }
    .notif-top { font-size: 14px; font-weight: 700; color: #fff; }
    .notif-top b { color: #ff4444; }
    .notif-bot { font-size: 11px; color: #666; font-weight: 600; }

    /* ── CELEBRACIÓN ── */
    #cel { position: fixed; inset: 0; pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #cel.show { opacity: 1; }
    .cel-glow { position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(200,0,0,0.25) 0%, transparent 65%); }
    .cel-main { font-family: 'Bebas Neue', sans-serif; font-size: 60px; color: #fff; letter-spacing: 5px; position: relative; z-index: 1; text-align: center; }
    .cel-desc { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: #ff8c00; letter-spacing: 3px; position: relative; z-index: 1; text-align: center; margin-top: 4px; }
    .particle { position: fixed; animation: fall 1.6s ease-in forwards; pointer-events: none; z-index: 99; }
    @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(115vh) rotate(540deg);opacity:0} }
  </style>
</head>
<body>
<div id="widget">

  <!-- BARRA -->
  <div class="bar-row">
    <div class="ch">
      <div class="ch-dot c1"></div>
      MarioTQ <span class="ch-val" id="v1">0</span>
      <span class="cdot" id="d1"></span>
    </div>

    <div class="bar-wrap">
      <div class="bar-bg"></div>
      <div id="bar2"></div>
      <div id="bar1"></div>
      <div class="bar-pct" id="bpct">0%</div>
    </div>

    <div class="ch">
      <div class="ch-dot c2"></div>
      Akim <span class="ch-val" id="v2">0</span>
      <span class="cdot" id="d2"></span>
    </div>

    <div class="total" id="tot">0 <small>/ 100,000 BITS</small></div>
  </div>

  <!-- RETOS -->
  <div class="retos-grid" id="retos"></div>

</div>

<!-- notificación -->
<div id="notif">
  <div class="notif-top" id="ntop">usuario donó <b>0</b> bits</div>
  <div class="notif-bot" id="nbot">en el canal de MarioTQ</div>
</div>

<!-- celebración -->
<div id="cel">
  <div class="cel-glow"></div>
  <div class="cel-main" id="cmain">¡RETO DESBLOQUEADO!</div>
  <div class="cel-desc" id="cdesc"></div>
</div>

<script>
const MILESTONES = [
  { bits: 10000,  emoji: '🎣', label: 'Ir a pescar' },
  { bits: 30000,  emoji: '💦', label: 'Globazos de agua con harina' },
  { bits: 40000,  emoji: '🏊', label: 'Ir a balneario' },
  { bits: 50000,  emoji: '😱', label: 'Depilada con cera' },
  { bits: 60000,  emoji: '🧪', label: 'Experimento casero' },
  { bits: 70000,  emoji: '🐕🐈', label: 'Acampar con Chopo y Genji' },
  { bits: 80000,  emoji: '🎯', label: 'Reto a elegir con la banda' },
  { bits: 90000,  emoji: '🩲', label: 'Balneario en tanga' },
  { bits: 100000, emoji: '🛵', label: 'Rapizza juntos en vivo' },
];

const MAX_GOAL = 100000;
const ID1 = '135201683', ID2 = '75262446';
const TOKEN1 = '5gxdemktqjg5bkj13lhqsl3gytxy3t';
const TOKEN2 = 'b9pffqqf2ko27k3lkbabpqw70fwexv';
const INIT_B1 = 11200, INIT_B2 = 15270;
const S = { b1: INIT_B1, b2: INIT_B2 };
const triggered = new Set();
triggered.add(10000);

function save() { localStorage.setItem('mbits5', JSON.stringify({ b1: S.b1, b2: S.b2 })); }
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('mbits5') || '{}');
    if (d.b1) S.b1 = Math.max(INIT_B1, d.b1);
    if (d.b2) S.b2 = Math.max(INIT_B2, d.b2);
  } catch(e) {}
}

function buildRetos() {
  const cont = document.getElementById('retos');
  cont.innerHTML = '';
  MILESTONES.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = 'reto';
    el.id = 'r_' + m.bits;
    const kbits = m.bits >= 1000 ? (m.bits / 1000).toFixed(0) + ',000' : m.bits;
    el.innerHTML = `
      <div class="reto-num">RETO ${i + 1}</div>
      <div class="reto-bits">${kbits} bits</div>
      <div class="reto-desc">
        <span class="reto-emoji">${m.emoji}</span>
        <span class="reto-label">${m.label}</span>
      </div>`;
    cont.appendChild(el);
  });
}

function updateUI() {
  const total = S.b1 + S.b2;
  const pct   = Math.min(100, (total / MAX_GOAL) * 100);
  const pct1  = Math.min(100, (S.b1  / MAX_GOAL) * 100);

  document.getElementById('tot').innerHTML = `${total.toLocaleString('es-MX')} <small>/ 100,000 BITS</small>`;
  document.getElementById('v1').textContent = S.b1.toLocaleString('es-MX');
  document.getElementById('v2').textContent = S.b2.toLocaleString('es-MX');
  document.getElementById('bpct').textContent = pct.toFixed(1) + '%';
  document.getElementById('bar1').style.width = pct1 + '%';
  document.getElementById('bar2').style.width = pct + '%';

  let nextSet = false;
  MILESTONES.forEach(m => {
    const el = document.getElementById('r_' + m.bits);
    if (!el) return;
    if (total >= m.bits)     { el.className = 'reto reached'; }
    else if (!nextSet)       { el.className = 'reto next'; nextSet = true; }
    else                     { el.className = 'reto'; }
  });

  MILESTONES.forEach(m => {
    if (total >= m.bits && !triggered.has(m.bits)) {
      triggered.add(m.bits);
      celebrate(m);
    }
  });

  save();
}

function celebrate(m) {
  document.getElementById('cmain').textContent = m.bits === MAX_GOAL ? '¡META FINAL!' : '¡RETO DESBLOQUEADO!';
  document.getElementById('cdesc').textContent = m.emoji + ' ' + m.label;
  const el = document.getElementById('cel');
  el.classList.add('show');
  spawnParticles();
  setTimeout(() => el.classList.remove('show'), m.bits === MAX_GOAL ? 8000 : 4500);
}

function spawnParticles() {
  const e = ['🔥','⚡','💎','⭐','🎉','🏆'];
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = e[Math.floor(Math.random() * e.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.fontSize = (12 + Math.random() * 14) + 'px';
      p.style.animationDelay = Math.random() * 0.5 + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2200);
    }, i * 35);
  }
}

let notifQ = [], notifShowing = false;
function queueNotif(u, a, c) { notifQ.push({ u, a, c }); if (!notifShowing) showNextNotif(); }
function showNextNotif() {
  if (!notifQ.length) { notifShowing = false; return; }
  notifShowing = true;
  const { u, a, c } = notifQ.shift();
  document.getElementById('ntop').innerHTML = `${u} donó <b>${a.toLocaleString('es-MX')}</b> bits`;
  document.getElementById('nbot').textContent = 'en el canal de ' + c;
  const el = document.getElementById('notif');
  el.classList.add('show');
  setTimeout(() => { el.classList.remove('show'); setTimeout(showNextNotif, 500); }, 3500);
}

function dot(n, st) { document.getElementById('d' + n).className = 'cdot ' + st; }

async function subscribeCheer(sessionId, broadcasterId, token) {
  const t = token.startsWith('oauth:') ? token.slice(6) : token;
  const v = await fetch('https://id.twitch.tv/oauth2/validate', { headers: { 'Authorization': 'OAuth ' + t } });
  if (!v.ok) throw new Error('Token inválido');
  const { client_id } = await v.json();
  await fetch('https://api.twitch.tv/helix/eventsub/subscriptions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + t, 'Client-Id': client_id, 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'channel.cheer', version: '1', condition: { broadcaster_user_id: broadcasterId }, transport: { method: 'websocket', session_id: sessionId } })
  });
}

function connectPS(id, token, ch) {
  dot(ch, 'wait');
  const ws = new WebSocket('wss://eventsub.wss.twitch.tv/ws');
  ws.onmessage = async (ev) => {
    const msg = JSON.parse(ev.data);
    const type = msg.metadata?.message_type;
    if (type === 'session_welcome') {
      try { await subscribeCheer(msg.payload.session.id, id, token); dot(ch, 'ok'); }
      catch(e) { console.error('ch' + ch, e); dot(ch, 'err'); }
    }
    if (type === 'notification') {
      try {
        const ev2 = msg.payload.event;
        const amount = ev2.bits;
        const user = ev2.user_name || 'Anónimo';
        const name = ch === 1 ? 'MarioTQ' : 'Akim';
        if (ch === 1) S.b1 += amount; else S.b2 += amount;
        updateUI(); queueNotif(user, amount, name);
      } catch(e) {}
    }
    if (type === 'session_reconnect') { ws.close(); setTimeout(() => connectPS(id, token, ch), 500); }
  };
  ws.onerror = () => dot(ch, 'err');
  ws.onclose = () => { dot(ch, 'err'); setTimeout(() => connectPS(id, token, ch), 5000); };
}

load();
buildRetos();
updateUI();
connectPS(ID1, TOKEN1, 1);
connectPS(ID2, TOKEN2, 2);
</script>
</body>
</html>
